# PostgreSQL Client Authentication Configuration
#
# IMPORTANT:
# - These defaults are cloud-friendly and allow password auth from any IPv4/IPv6 source.
# - Restrict to known CIDRs for production hardening.

# Unix socket access inside container
# Use trust so first-run init can work even when POSTGRES_USER is not "postgres".
local   all             all                                     trust

# Localhost over TCP
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Remote access over TCP (tighten CIDRs for production)
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
