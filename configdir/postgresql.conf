# Listen addresses are set from docker-compose via:
#   -c listen_addresses=${POSTGRES_LISTEN_ADDRESSES}
# Keep this file focused on conservative server defaults.

# UTF-8 client encoding by default
client_encoding = 'UTF8'

# Keep server and log timestamps consistent
timezone = 'UTC'
log_timezone = 'UTC'

# Use modern password hashing for role passwords
password_encryption = scram-sha-256

# Enable logging collector with conservative defaults
logging_collector = on
log_destination = 'stderr'
log_line_prefix = '%m [%p] %q%u@%d '
log_min_duration_statement = 5000

# Consider tuning memory/IO based on your VM resources (left at defaults here)
# shared_buffers = 256MB
# work_mem = 4MB
# maintenance_work_mem = 64MB
